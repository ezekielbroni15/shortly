<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta
      name="description"
      content="Shortly — shorten your links, boost your brand recognition, and track detailed analytics all in one place."
    />
    <title>Shortly | URL Shortening &amp; Link Management</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />

    <!-- Google Fonts: Poppins 500 & 700 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>

    <!-- =============================================
         HEADER / NAVBAR
         ============================================= -->
    <header class="site-header">
      <nav class="navbar navbar-expand-md" aria-label="Primary navigation">
        <div class="container-shortly d-flex align-items-center w-100">

          <!-- Logo -->
          <a class="navbar-brand p-0" href="/" aria-label="Shortly home">
            <img
              src="images/logo.svg"
              alt="Shortly"
              class="navbar__logo"
              width="121"
              height="33"
            />
          </a>

          <!-- Hamburger toggle (mobile only) -->
          <button
            class="navbar-toggler ms-auto"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#primary-nav"
            aria-controls="primary-nav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <!-- Collapsible nav content -->
          <div class="collapse navbar-collapse" id="primary-nav">

            <!-- Left nav links -->
            <ul class="navbar__nav nav ms-md-4 me-auto" role="list">
              <li class="nav-item">
                <a class="nav-link" href="#">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Pricing</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Resources</a>
              </li>
            </ul>

            <!-- Divider: hidden on desktop, visible as horizontal rule inside mobile card -->
            <hr class="navbar__mobile-divider d-md-none" aria-hidden="true" />

            <!-- Right auth links -->
            <ul class="navbar__auth nav align-items-center" role="list">
              <li class="nav-item">
                <a class="nav-link" href="#">Login</a>
              </li>
              <li class="nav-item ms-md-2">
                <a class="btn-cyan" href="#" role="button">Sign Up</a>
              </li>
            </ul>

          </div><!-- /navbar-collapse -->
        </div><!-- /container -->
      </nav>
    </header>

    <main id="main-content">

      <!-- =============================================
           HERO SECTION
           ============================================= -->
      <section class="hero" aria-label="Hero">
        <div class="container-shortly hero__inner">
          <div class="row align-items-center">

            <!-- Text column -->
            <div class="col-12 col-md-6 hero__text-col order-2 order-md-1">
              <h1 class="hero__heading">
                More than just shorter links
              </h1>
              <p class="hero__subtext">
                Build your brand's recognition and get detailed insights
                on how your links are performing.
              </p>
              <a href="#shorten-form" class="btn-cyan hero__cta">Get Started</a>
            </div>

            <!-- Illustration column -->
            <div class="col-12 col-md-6 hero__img-col order-1 order-md-2">
              <div class="hero__img-wrapper">
                <img
                  src="images/illustration-working.svg"
                  alt="Person working at a computer"
                  class="hero__illustration"
                  width="733"
                  height="482"
                />
              </div>
            </div>

          </div><!-- /row -->
        </div><!-- /container -->
      </section>

      <!-- =============================================
           URL SHORTENER FORM + RESULTS
           ============================================= -->
      <section class="shortener" aria-label="URL Shortener">

        <!-- Shorten form -->
        <div class="shortener__form-wrapper">
        </div>
        <ul
          class="shortener__results"
          id="results-list"
          role="list"
          aria-label="Shortened links"
          aria-live="polite"
        ></ul>

      </section>

      <!-- =============================================
           ADVANCED STATISTICS
           ============================================= -->
      <section class="statistics" aria-labelledby="stats-heading">
      </section>

      <!-- =============================================
           CTA BANNER
           ============================================= -->
      <section class="cta-banner" aria-label="Call to action">
      </section>

    </main>

    <!-- =============================================
         FOOTER
         ============================================= -->
    <footer class="site-footer" role="contentinfo">
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmWEQRMUFDAM7z1Uqm4M+A8TkTb"
      crossorigin="anonymous"
    ></script>

    <!-- Custom Script -->
    <script src="js/main.js"></script>

  </body>
</html>
